<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Login</title>
        <link rel="stylesheet" href="/css/login.css">
    </head>

    <body>
        <div class="container">
            <div class="login-box">
                <h2>Login</h2>
                <br>
                <form id="loginForm">
                    <input
                        type="email"
                        id="email"
                        placeholder="Email"
                        required
                    >
                    <br><br>
                    <input
                        type="password"
                        id="password"
                        placeholder="Password"
                        required
                    >
                    <br><br>
                    <button type="submit">
                        Login
                    </button>

                </form>
            </div>
        </div>

        <script src="/js/login.js"></script>

    </body>
</html>
