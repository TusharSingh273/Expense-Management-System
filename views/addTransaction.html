<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Transaction</title>
    <link rel="stylesheet" href="/css/addTransaction.css">
</head>
<body>
    <div class="container">
        <div class="form-card">
            <h1 id="pageTitle">Add Transaction</h1>
            <p>Track your finances by adding a new transaction.</p>
            <form id="transactionForm">
                <div class="form-group">
                    <label>Category</label>
                    <input
                        type="text"
                        id="category"
                        placeholder="Food, Salary, Rent..."
                    >
                </div>
                <div class="form-group">
                    <label>Amount</label>
                    <input
                        type="number"
                        id="amount"
                        placeholder="₹ 0.00"
                    >
                </div>
                <div class="row">
                    <div class="form-group">
                        <label>Transaction Type</label>
                        <select id="transactionType">
                            <option value="income">Income</option>
                            <option value="expense">Expense</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Date</label>
                        <input
                            type="date"
                            id="transactionDate"
                        >
                    </div>
                </div>
                <button
                    class="submit-btn"
                    type="submit"
                >
                    Save Transaction
                </button>
            </form>
            <a href="/dashboard" class="back">
                ← Back to Dashboard
            </a>
        </div>
    </div>
    <script src="/js/addTransaction.js"></script>

</body>
</html>
